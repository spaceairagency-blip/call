<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .video-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        video { width: 90%; max-width: 350px; border-radius: 15px; background: #000; border: 2px solid #333; transform: scaleX(-1); }
        .btns { margin-top: 25px; }
        button { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .start { background: #007bff; color: white; }
        .join { background: #28a745; color: white; }
        #status { margin-top: 20px; color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Mini Messenger Call</h2>
    
    <div class="video-box">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="btns">
        <button class="start" onclick="createCall()">1. Start Call (Host)</button>
        <button class="join" onclick="joinCall()">2. Join Call (Friend)</button>
    </div>

    <p id="status">Status: Allow camera permissions to begin.</p>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzrTD9jdND0MApU8YwnWwb6dtlcSnWN_kCXkGAaqsWRFKcqRmdEy0KOhCfVmEpIJ5Fa/exec"; 
        let localStream;
        let pc;
        const status = document.getElementById('status');

        // Using Google's STUN server to bypass firewalls
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                status.innerText = "Camera Active. Ready.";
            } catch (e) {
                status.innerText = "Error: Please allow Camera/Mic access!";
                console.error(e);
            }
        }

        async function createCall() {
            status.innerText = "Creating Offer...";
            pc = new RTCPeerConnection(config);
            
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = e => {
                if (!e.candidate) {
                    // Send the "Offer" to Google Script
                    google.script.run.setSignal(JSON.stringify(pc.localDescription));
                    status.innerText = "Waiting for friend to join...";
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Loop: Check every 3 seconds if the friend has "answered"
            const interval = setInterval(() => {
                google.script.run.withSuccessHandler(res => {
                    if (!res) return;
                    const data = JSON.parse(res);
                    if (data.type === 'answer') {
                        pc.setRemoteDescription(new RTCSessionDescription(data));
                        status.innerText = "Connected!";
                        clearInterval(interval);
                    }
                }).getSignal();
            }, 3000);
        }

        async function joinCall() {
            status.innerText = "Searching for call...";
            google.script.run.withSuccessHandler(async (res) => {
                if (!res) { status.innerText = "No active call found."; return; }
                const offer = JSON.parse(res);
                
                pc = new RTCPeerConnection(config);
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                
                pc.ontrack = e => {
                    document.getElementById('remoteVideo').srcObject = e.streams[0];
                    status.innerText = "Connected!";
                };

                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                google.script.run.setSignal(JSON.stringify(pc.localDescription));
            }).getSignal();
        }

        window.onload = init;
    </script>
</body>
</html>
